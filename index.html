<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>소수 나눗셈 MASTER</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      padding: 16px;
    }
    .app {
      max-width: 1000px;
      margin: 0 auto;
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      border: 4px solid #facc15;
      box-shadow: 0 20px 40px rgba(0,0,0,0.12);
    }
    .header {
      background: #facc15;
      padding: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .title {
      font-size: 28px;
      font-weight: 900;
      color: #1e3a8a;
      margin: 0;
    }
    .score-box {
      background: #1e3a8a;
      color: #fff;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 18px;
    }
    .content { padding: 24px; }
    .center { text-align: center; }
    .btn {
      border: none;
      border-radius: 18px;
      padding: 16px 28px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-dark {
      background: #1e293b;
      color: #fff;
      width: 100%;
      max-width: 360px;
    }
    .btn-red { background: #ef4444; color: #fff; }
    .btn-gray { background: #e2e8f0; color: #334155; }
    .menu-wrap, .result-wrap {
      padding: 40px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .big-ball {
      width: 132px;
      height: 132px;
      border-radius: 50%;
      border: 4px solid #000;
      background: linear-gradient(to bottom, #ef4444 0 50%, #fff 50% 100%);
      position: relative;
    }
    .big-ball::before {
      content: "";
      position: absolute;
      left: 0; right: 0; top: 50%;
      height: 6px;
      background: #000;
      transform: translateY(-50%);
    }
    .big-ball::after {
      content: "";
      position: absolute;
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 4px solid #000;
      background: #fff;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .subtitle { color: #64748b; line-height: 1.6; }
    .progress-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
      background: #f1f5f9;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 24px;
    }
    @media (min-width: 700px) {
      .progress-grid { grid-template-columns: repeat(10, 1fr); }
    }
    .ball-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .mini-ball {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid #000;
      position: relative;
      overflow: hidden;
      background: #e5e7eb;
    }
    .mini-ball::before {
      content: "";
      position: absolute;
      left: 0; right: 0; top: 50%;
      height: 2px;
      background: #000;
      transform: translateY(-50%);
    }
    .mini-ball::after {
      content: "";
      position: absolute;
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 1px solid #000;
      background: #fff;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .ball-label {
      font-size: 10px;
      font-weight: 700;
      color: #64748b;
    }
    .active { background: #facc15 !important; }
    .win { background: #ef4444 !important; }
    .lose { background: #9ca3af !important; }
    .problem-card {
      border: 4px solid #e2e8f0;
      border-radius: 24px;
      padding: 32px 20px;
      position: relative;
      text-align: center;
      background: #fff;
    }
    .level-badge {
      position: absolute;
      top: 0; right: 0;
      padding: 10px 18px;
      border-bottom-left-radius: 18px;
      color: #fff;
      font-weight: 800;
      font-size: 14px;
    }
    .level-basic { background: #22c55e; }
    .level-normal { background: #3b82f6; }
    .level-advanced { background: #a855f7; }
    .question {
      font-size: 38px;
      font-weight: 900;
      margin: 40px 0 28px;
    }
    .answer-area {
      max-width: 360px;
      margin: 0 auto;
    }
    .answer-input {
      width: 100%;
      padding: 18px;
      text-align: center;
      font-size: 30px;
      font-weight: 800;
      border-radius: 18px;
      border: 4px solid #e2e8f0;
      outline: none;
      background: #f8fafc;
    }
    .feedback {
      margin-top: 18px;
      font-size: 22px;
      font-weight: 800;
    }
    .correct { color: #16a34a; }
    .wrong { color: #dc2626; }
    .result-title {
      font-size: 40px;
      font-weight: 900;
      margin: 0;
    }
    .result-sub {
      font-size: 22px;
      color: #64748b;
      margin-top: 8px;
    }
    .stat-row {
      margin-top: 18px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .stat {
      padding: 12px 18px;
      border-radius: 14px;
      font-weight: 800;
    }
    .stat-blue { background: #dbeafe; color: #1d4ed8; }
    .stat-red { background: #fee2e2; color: #b91c1c; }
    .btn-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .review-item {
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      border-radius: 20px;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1 class="title">소수 나눗셈 MASTER</h1>
      <div class="score-box">🏆 <span id="scoreText">0 / 30</span></div>
    </div>
    <div class="content" id="content"></div>
  </div>

  <script>
    const state = {
      gameState: 'menu',
      currentStage: 0,
      score: 0,
      consecutiveCorrect: 0,
      wrongQuestions: [],
      completedStages: {},
      userInput: '',
      feedback: null,
      currentProblem: null
    };

    function generateProblem(index, level) {
      let num1, num2, answer;
      if (level === 'basic') {
        num2 = Math.floor(Math.random() * 5) + 2;
        answer = (Math.floor(Math.random() * 9) + 1) / 10;
        num1 = Number((answer * num2).toFixed(2));
      } else if (level === 'advanced') {
        num2 = Math.floor(Math.random() * 12) + 11;
        answer = (Math.floor(Math.random() * 50) + 1) / 100;
        num1 = Number((answer * num2).toFixed(3));
      } else {
        num2 = Math.floor(Math.random() * 8) + 2;
        answer = (Math.floor(Math.random() * 20) + 11) / 10;
        num1 = Number((answer * num2).toFixed(2));
      }
      return {
        id: index,
        num1, num2,
        answer: answer.toString(),
        level,
        question: `${num1} ÷ ${num2} = ?`
      };
    }

    function getLevelText(level) {
      if (level === 'advanced') return '심화';
      if (level === 'basic') return '기초';
      return '보통';
    }

    function getLevelClass(level) {
      if (level === 'advanced') return 'level-advanced';
      if (level === 'basic') return 'level-basic';
      return 'level-normal';
    }

    function startApp() {
      state.gameState = 'playing';
      state.currentStage = 0;
      state.score = 0;
      state.consecutiveCorrect = 0;
      state.wrongQuestions = [];
      state.completedStages = {};
      state.userInput = '';
      state.feedback = null;
      state.currentProblem = generateProblem(0, 'normal');
      render();
    }

    function handleAnswer() {
      if (!state.userInput || state.feedback) return;
      const isCorrect = parseFloat(state.userInput) === parseFloat(state.currentProblem.answer);

      if (isCorrect) {
        state.feedback = { type: 'correct', message: '굉장해! 정답이야!' };
        state.score += 1;
        state.consecutiveCorrect = Math.max(state.consecutiveCorrect + 1, 1);
        state.completedStages[state.currentStage] = { status: 'win', level: state.currentProblem.level };
      } else {
        state.feedback = { type: 'wrong', message: `아쉬워! 정답은 ${state.currentProblem.answer}였어.` };
        state.consecutiveCorrect = Math.min(state.consecutiveCorrect - 1, -1);
        state.wrongQuestions.push({ ...state.currentProblem, userAns: state.userInput });
        state.completedStages[state.currentStage] = { status: 'lose', level: state.currentProblem.level };
      }

      render();

      setTimeout(() => {
        state.feedback = null;
        state.userInput = '';
        if (state.currentStage < 29) {
          const nextStage = state.currentStage + 1;
          state.currentStage = nextStage;
          const nextLevel = isCorrect ? (state.consecutiveCorrect >= 2 ? 'advanced' : 'normal') : 'basic';
          state.currentProblem = generateProblem(nextStage, nextLevel);
        } else {
          state.gameState = 'result';
        }
        render();
      }, 1500);
    }

    function renderProgressGrid() {
      let html = '<div class="progress-grid">';
      for (let i = 0; i < 30; i++) {
        const completed = state.completedStages[i];
        let cls = 'mini-ball';
        if (completed) cls += completed.status === 'win' ? ' win' : ' lose';
        if (i === state.currentStage && state.gameState === 'playing') cls += ' active';
        html += `<div class="ball-wrap"><div class="${cls}"></div><span class="ball-label">${i + 1}</span></div>`;
      }
      html += '</div>';
      return html;
    }

    function renderMenu() {
      return `
        <div class="menu-wrap center">
          <div class="big-ball"></div>
          <div>
            <h2 style="font-size:36px;font-weight:900;margin:0 0 10px;">도전! 소수 나눗셈 30</h2>
            <p class="subtitle">포켓몬 볼 속에 숨겨진 30개의 문제를 해결하고<br>수학 마스터가 되어보세요!</p>
          </div>
          <button class="btn btn-primary" onclick="startApp()">모험 시작하기</button>
        </div>
      `;
    }

    function renderPlaying() {
      return `
        ${renderProgressGrid()}
        <div class="problem-card">
          <div class="level-badge ${getLevelClass(state.currentProblem.level)}">
            난이도: ${getLevelText(state.currentProblem.level)}
          </div>
          <div class="question">${state.currentProblem.question}</div>
          <div class="answer-area">
            <input id="answerInput" class="answer-input" type="number" step="0.01" placeholder="정답 입력...">
            ${state.feedback ? `<div class="feedback ${state.feedback.type}">${state.feedback.message}</div>` : ''}
          </div>
          <div style="margin-top:24px;">
            <button class="btn btn-dark" onclick="handleAnswer()">제출하기</button>
          </div>
        </div>
      `;
    }

    function renderResult() {
      return `
        <div class="result-wrap center">
          <h2 class="result-title">모험 종료!</h2>
          <p class="result-sub">당신은 소수 나눗셈 ${state.score >= 25 ? '마스터' : '베테랑'}입니다!</p>
          <div class="stat-row">
            <div class="stat stat-blue">맞힌 문제: ${state.score}</div>
            <div class="stat stat-red">틀린 문제: ${state.wrongQuestions.length}</div>
          </div>
          <div class="btn-row">
            <button class="btn btn-primary" onclick="startApp()">처음부터 다시하기</button>
            ${state.wrongQuestions.length > 0 ? `<button class="btn btn-red" onclick="showReview()">오답 보기</button>` : ''}
          </div>
        </div>
      `;
    }

    function showReview() {
      state.gameState = 'review';
      render();
    }

    function renderReview() {
      return `
        <h2>오답 복습하기</h2>
        <button class="btn btn-gray" onclick="backToResult()">돌아가기</button>
        <div style="margin-top:16px;">
          ${state.wrongQuestions.map(q => `
            <div class="review-item">
              <div><strong>${q.question}</strong></div>
              <div>내 답: <span style="text-decoration:line-through;color:#94a3b8;">${q.userAns}</span> / 정답: <span style="color:#15803d;font-weight:800;">${q.answer}</span></div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function backToResult() {
      state.gameState = 'result';
      render();
    }

    function render() {
      document.getElementById('scoreText').textContent = `${state.score} / 30`;
      const content = document.getElementById('content');

      if (state.gameState === 'menu') content.innerHTML = renderMenu();
      if (state.gameState === 'playing') content.innerHTML = renderPlaying();
      if (state.gameState === 'result') content.innerHTML = renderResult();
      if (state.gameState === 'review') content.innerHTML = renderReview();

      const input = document.getElementById('answerInput');
      if (input) {
        input.focus();
        input.addEventListener('input', e => state.userInput = e.target.value);
        input.addEventListener('keydown', e => {
          if (e.key === 'Enter') handleAnswer();
        });
      }
    }

    state.currentProblem = generateProblem(0, 'normal');
    render();
  </script>
</body>
</html>
